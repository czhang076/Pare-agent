[project]
name = "forge"
version = "0.1.0"
description = "A lightweight, extensible coding agent framework"
requires-python = ">=3.12"
license = "MIT"

dependencies = [
    # LLM SDKs
    "anthropic>=0.40.0",
    "openai>=1.50.0",

    # CLI
    "rich>=13.0",
    "prompt-toolkit>=3.0",

    # Data validation
    "pydantic>=2.0",

    # Async
    "anyio>=4.0",

    # Token counting (OpenAI models)
    "tiktoken>=0.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "ruff>=0.8",
    "mypy>=1.13",
]

mcp = [
    "mcp>=1.0",
]

docker = [
    "docker>=7.0",
]

[project.scripts]
forge = "forge.main:main"

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true
